        document.write((a*b) +"<br>");
        document.write((a/b) +"<br>");

        document.write((b%=10) +"<br>");                   // b = b % 10
        
        const c=5;                                       //Comparison Operator(answer T/F)
        const d="5"; 
        document.write("Comparison Operator:"+ "<br>"); 
        document.write((a==b) + "<br>");                  // "==" check if value are same.
        document.write((a===b) + "<br>");                 // "===" check if value and data type are same.
        document.write((a!=b) + "<br>");
        document.write((a!==b) + "<br>");                  // "!==" check both value and dtype.
        document.write((a>b) + "<br>"); 
        document.write((a>=b) + "<br>");
        
         //Logical Operator          //and = (&&),or=(||),Not=(!)


         //Increment and Decrement
        let e=10;                                       
        document.write((e++) + "<br>");                  //(e++)- will give the print the value of e and increment at the back end.
        document.write((++e) + "<br>");                  //(++e)- will increment the value and then print it.
        document.write((e--) + "<br>");
        document.write((--e) + "<br>");
        
        //CONTROL STATEMENT
        // if....else
        let y=25;
        let z=35;
        if (y>z && y>50)
        {                                                          //   curly bracket open to curly bracket close is one block 
            document.write(y + "<br>");
        }
        else
        {
            document.write(z +"<br>");
        }


        const score=83;
        if (score>=90)

        }
        else if (score>=80)
        {
            console.log("Grade B");
        }
        else if (score>=70)
        {

        }
        else if (score>=60)
        {

        }
        else

        //switch  &  break

        let day=8;
        switch (day)
        {
            case 1:
                console.log("Monday");
                break;
            case 2:
                console.log("Tuesday");
                break;
            case 3:
                console.log("Wednesday");
                break;
            case 4:

                break;
            case 5:
                console.log("Friday");
                break;
            case 6:
                console.log("Saturday");
                break;
            case 7:
                console.log("Sunday");
                break; 
            default: 
                console.log("Invalid Day");
        }

        // loops //
        // for and while has three condition 1.assigning,2.condition,3.increment and decrement//
        
        //FOR LOOP  

        for (let i=1;i<=5; i++)
        {
           console.log("iteration" + i);
        }

        for (let j=1;j<=5;j++){        //break
            if (j==3){
                break;
            }
            console.log(j);
        }

        for (let j=1;j<=5;j++){           //continue
            if (j==3){
               continue;
            }
            console.log(j);
        }

        for(k=10;k>=50;k++)   //This code will never run kyuki vo loop chalne ke liye condition check hogi 10>=50 aur wo false hai 
        {
            console.log(k);        //no output,no error 
        }

        
        for(k=5;k<=50;k--)            // Infinite loop
        {
            console.log(k);
        }

        for (let i=1;i<=3;i++){        // Nested list
            for (let j=1;j<=2;j++){
                console.log("i="+i+",j="+j);
            }
        }

        // WHILE LOOPS 

        let k=1;
        while(k<=5){
            console.log("count:"+k);
            k++;   //Increment to avoid infinite looping
        }   

       
        // DO WHILE LOOP 
        let j=1;
        do{
            console.log("Number:",j);
            j++;
        }
        while(j<=5);
        
        
    </script>
